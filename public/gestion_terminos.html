<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión Términos – Cafetería UTHH</title>
    <link rel="stylesheet" href="css/output.css">
</head>

<body class="bg-unicafe-body min-h-screen font-sans text-[#1f1f1f]">

<header class="bg-unicafe-header text-white p-4 shadow-unicafe flex justify-between items-center">
    <h1 class="font-bold text-lg">Cafetería UTHH</h1>
</header>

<main class="max-w-6xl mx-auto p-6">

    <div class="text-center mb-6">
        <button id="btnToggle"
            class="bg-unicafe-botones text-white px-6 py-2 rounded-lg font-bold hover:opacity-90 transition shadow-unicafe">
            Agregar Nuevo Término
        </button>
    </div>

    <div id="formulario"
        class="hidden bg-white border border-unicafe-navbar rounded-xl shadow-unicafe p-8 mb-10 transition">
        
       <div class="mb-10">
       <h2 class="text-4xl font-extrabold text-unicafe-header mb-6">
         Agregar nuevo término
        </h2>
        <hr class="border-gray-300">
        </div>

        <div class="space-y-6">
            <div>
                <label class="block font-semibold mb-2">Título</label>
                <input type="text"
                    class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-unicafe-botones outline-none transition"
                    placeholder="Ej: Uso permitido del sistema">
            </div>

            <div>
                <label class="block font-semibold mb-2">Descripción</label>
                <textarea rows="4"
                    class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-unicafe-botones outline-none transition"
                    placeholder="Escribe el contenido del término..."></textarea>
            </div>

            <div class="text-center space-x-4">
                <button
                    class="bg-unicafe-botones text-white px-6 py-2 rounded-lg font-bold hover:opacity-90 transition shadow-unicafe">
                    Guardar Término
                </button>

                <a href="terminos.php" target="_blank"
                    class="bg-unicafe-botones text-white px-6 py-2 rounded-lg font-bold hover:opacity-90 transition shadow-unicafe inline-block">
                    Ver como Usuario
                </a>
            </div>
        </div>
    </div>

    <div id="contenedorTabla" class="bg-white border border-unicafe-navbar rounded-xl shadow-unicafe p-6">
        
        <h1 class="text-4xl font-extrabold text-unicafe-header mb-6">
            Listado de Términos 
        </h1>

        <div class="overflow-x-auto">
            <table class="w-full text-center border-collapse">
                <thead>
                    <tr class="bg-unicafe-header text-white">
                        <th class="p-3">Título</th>
                        <th class="p-3">Descripción</th>
                        <th class="p-3">Acciones</th>
                    </tr>
                </thead>
                <tbody class="divide-y">
                    <tr class="hover:bg-gray-50 transition">
                        <td class="p-4 font-semibold">Uso del Sistema</td>
                        <td class="p-4 text-left">El usuario deberá utilizar la plataforma de manera responsable.</td>
                        <td class="p-4 space-x-3">
                            <button class="text-blue-600 font-bold hover:underline">Editar</button>
                            <button class="text-red-600 font-bold hover:underline">Eliminar</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</main>

<script>
const btn = document.getElementById('btnToggle');
const form = document.getElementById('formulario');
const tabla = document.getElementById('contenedorTabla');

btn.addEventListener('click', () => {
    // Alternar visibilidad del formulario
    const isFormHidden = form.classList.toggle('hidden');

    if(isFormHidden){
        // Si el formulario se oculta: mostramos la tabla y cambiamos texto del botón
        tabla.classList.remove('hidden');
        btn.textContent = "Agregar Nuevo Término";
    } else {
        // Si el formulario se muestra: ocultamos la tabla y cambiamos texto del botón
        tabla.classList.add('hidden');
        btn.textContent = "Ocultar Formulario";
    }
});
</script>

</body>
</html>
